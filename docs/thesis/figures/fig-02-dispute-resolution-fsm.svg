<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <title>Figure 2: Dispute Resolution FSM (Theorem T6)</title>
  <text x="350" y="25" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e293b">Figure 2: Dispute Resolution FSM (Theorem T6)</text>

  <!-- q1: FEE_AUTHORIZED_PENDING_REVIEW -->
  <circle cx="80" cy="170" r="40" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="80" y="165" text-anchor="middle" font-size="10" fill="#92400e">q₁</text>
  <text x="80" y="180" text-anchor="middle" font-size="8" fill="#92400e">PENDING</text>
  <!-- start arrow -->
  <line x1="10" y1="170" x2="36" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- q2: IN_REVIEW -->
  <circle cx="240" cy="170" r="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="165" text-anchor="middle" font-size="10" fill="#1e40af">q₂</text>
  <text x="240" y="180" text-anchor="middle" font-size="8" fill="#1e40af">IN_REVIEW</text>

  <!-- q3: ESCALATED -->
  <circle cx="240" cy="310" r="35" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="240" y="305" text-anchor="middle" font-size="10" fill="#4338ca">q₃</text>
  <text x="240" y="320" text-anchor="middle" font-size="8" fill="#4338ca">ESCALATED</text>

  <!-- q4: RESOLVED_UPHELD (terminal) -->
  <circle cx="480" cy="100" r="38" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <circle cx="480" cy="100" r="33" fill="none" stroke="#dc2626" stroke-width="1"/>
  <text x="480" y="95" text-anchor="middle" font-size="10" fill="#991b1b">q₄</text>
  <text x="480" y="110" text-anchor="middle" font-size="8" fill="#991b1b">UPHELD</text>

  <!-- q5: RESOLVED_OVERTURNED (terminal) -->
  <circle cx="480" cy="240" r="38" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
  <circle cx="480" cy="240" r="33" fill="none" stroke="#16a34a" stroke-width="1"/>
  <text x="480" y="235" text-anchor="middle" font-size="10" fill="#15803d">q₅</text>
  <text x="480" y="250" text-anchor="middle" font-size="8" fill="#15803d">OVERTURNED</text>

  <!-- q1 → q2: REVIEW -->
  <line x1="120" y1="170" x2="196" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="158" y="163" text-anchor="middle" font-size="10" fill="#64748b">REVIEW</text>

  <!-- q2 → q4: UPHOLD -->
  <line x1="270" y1="145" x2="448" y2="110" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="118" text-anchor="middle" font-size="10" fill="#dc2626">UPHOLD</text>
  <text x="360" y="130" text-anchor="middle" font-size="8" fill="#94a3b8" font-style="italic">capture fee</text>

  <!-- q2 → q5: OVERTURN -->
  <line x1="270" y1="195" x2="448" y2="230" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="223" text-anchor="middle" font-size="10" fill="#16a34a">OVERTURN</text>
  <text x="360" y="235" text-anchor="middle" font-size="8" fill="#94a3b8" font-style="italic">cancel fee</text>

  <!-- q2 → q3: ESCALATE -->
  <line x1="230" y1="210" x2="235" y2="272" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="208" y="248" font-size="10" fill="#6366f1">ESCALATE</text>

  <!-- q3 → q2: RE_REVIEW (curved) -->
  <path d="M 260,280 C 310,250 310,210 258,185" fill="none" stroke="#334155" stroke-width="1.2" stroke-dasharray="4" marker-end="url(#arr)"/>
  <text x="305" y="230" font-size="9" fill="#64748b">RE_REVIEW</text>

  <!-- q3 → q4: UPHOLD -->
  <line x1="275" y1="300" x2="448" y2="120" stroke="#dc2626" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr)"/>
  <text x="390" y="195" font-size="9" fill="#dc2626">UPHOLD</text>

  <!-- q3 → q5: OVERTURN -->
  <line x1="275" y1="310" x2="448" y2="250" stroke="#16a34a" stroke-width="1" stroke-dasharray="4" marker-end="url(#arr)"/>
  <text x="390" y="295" font-size="9" fill="#16a34a">OVERTURN</text>

  <!-- Legend -->
  <text x="560" y="170" font-size="11" fill="#334155" font-weight="bold">Legend</text>
  <circle cx="570" cy="190" r="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="585" y="194" font-size="9" fill="#475569">Non-terminal</text>
  <circle cx="570" cy="210" r="8" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <circle cx="570" cy="210" r="6" fill="none" stroke="#dc2626" stroke-width="0.5"/>
  <text x="585" y="214" font-size="9" fill="#475569">Terminal (double circle)</text>
  <line x1="555" y1="230" x2="585" y2="230" stroke="#334155" stroke-width="1.5"/>
  <text x="590" y="234" font-size="9" fill="#475569">Direct transition</text>
  <line x1="555" y1="248" x2="585" y2="248" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>
  <text x="590" y="252" font-size="9" fill="#475569">Escalated path</text>
</svg>
