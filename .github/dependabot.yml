version: 2

updates:
  # Root workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      dev-tooling:
        patterns:
          - "turbo"
          - "prettier"
          - "eslint*"
          - "typescript"
      security-critical:
        patterns:
          - "stripe"
          - "bcrypt*"
          - "jsonwebtoken"
          - "helmet"

  # API workspace
  - package-ecosystem: "npm"
    directory: "/src/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "api"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      security-critical:
        patterns:
          - "stripe"
          - "bcrypt*"
          - "jsonwebtoken"
          - "helmet"
      aws-sdk:
        patterns:
          - "@aws-sdk/*"

  # Web workspace
  - package-ecosystem: "npm"
    directory: "/src/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "web"
    groups:
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"

  # Shared workspace
  - package-ecosystem: "npm"
    directory: "/src/shared"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"

  # Mobile workspace
  - package-ecosystem: "npm"
    directory: "/src/mobile"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "mobile"
    groups:
      react-native:
        patterns:
          - "react-native*"
          - "@react-native*"
          - "@react-navigation/*"

  # Desktop workspace
  - package-ecosystem: "npm"
    directory: "/src/desktop"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
