name: Deploy Ask Styx to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/ask-styx/**'
      - '.github/workflows/deploy-ask-styx.yml'

permissions:
  contents: read
  pages: write
  id-token: write # allow-secret

concurrency:
  group: ask-styx-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        working-directory: src/ask-styx
        env:
          VITE_WORKER_URL: ${{ vars.ASK_STYX_WORKER_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: src/ask-styx/dist
      - id: deployment
        uses: actions/deploy-pages@v4
