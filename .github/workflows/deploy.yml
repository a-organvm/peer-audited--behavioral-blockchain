name: Deploy to Production

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deployment trigger and ref
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref:   ${{ github.ref }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "❌ Manual production deploys are only allowed from main."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            case "${{ github.ref }}" in
              refs/tags/v*) ;;
              *)
                echo "❌ Tag deploys must use refs/tags/v*."
                exit 1
                ;;
            esac
          fi

  deploy_api:
    runs-on: ubuntu-latest
    needs: preflight
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy API to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_API_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  deploy_web:
    runs-on: ubuntu-latest
    needs: preflight
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Web to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_WEB_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  smoke_test:
    runs-on: ubuntu-latest
    needs: [deploy_api, deploy_web]
    environment: production
    steps:
      - name: Wait for services
        run: sleep 30

      - name: Health check API (with rollback)
        env:
          API_URL: ${{ secrets.API_URL }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
        run: |
          MAX_ATTEMPTS=12
          INTERVAL=10
          HEALTHY=false

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Health check attempt $i/$MAX_ATTEMPTS..."
            status=$(curl -s -o /tmp/health.json -w "%{http_code}" "$API_URL/health" || echo "000")

            if [ "$status" = "200" ]; then
              # Check that the response indicates all systems ok
              health_status=$(cat /tmp/health.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
              if [ "$health_status" = "ok" ]; then
                echo "✅ API health check passed (all systems ok)"
                HEALTHY=true
                break
              elif [ "$health_status" = "degraded" ]; then
                echo "⚠️  API responded but degraded — retrying..."
              fi
            else
              echo "  HTTP $status — retrying in ${INTERVAL}s..."
            fi
            sleep $INTERVAL
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "❌ Health check failed after ${MAX_ATTEMPTS} attempts ($(( MAX_ATTEMPTS * INTERVAL ))s)"
            echo "🔄 Triggering best-effort redeploy fallback (not a deterministic rollback to a known-good deploy)..."

            # Best-effort fallback: trigger a new deploy. This is NOT a deterministic rollback.
            curl -s -X POST "https://api.render.com/v1/services/${RENDER_API_SERVICE_ID}/deploys" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"clearCache": false}' || echo "Rollback trigger attempted"

            exit 1
          fi

      - name: Health check Web
        env:
          WEB_URL: ${{ secrets.WEB_URL }}
        run: |
          if [ -z "${WEB_URL:-}" ]; then
            echo "::warning::Skipping web smoke test: WEB_URL secret not configured."
            exit 0
          fi

          MAX_ATTEMPTS=12
          INTERVAL=10

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Web health check attempt $i/$MAX_ATTEMPTS..."
            status=$(curl -s -o /tmp/web.html -w "%{http_code}" "$WEB_URL" || echo "000")
            if [ "$status" = "200" ]; then
              echo "✅ Web smoke test passed"
              exit 0
            fi
            echo "  HTTP $status — retrying in ${INTERVAL}s..."
            sleep $INTERVAL
          done

          echo "❌ Web smoke test failed after ${MAX_ATTEMPTS} attempts"
          exit 1
