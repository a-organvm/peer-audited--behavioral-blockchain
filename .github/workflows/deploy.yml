name: Deploy to Production

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy_api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy API to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_API_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  deploy_web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Web to Render
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.RENDER_WEB_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  smoke_test:
    runs-on: ubuntu-latest
    needs: [deploy_api, deploy_web]
    steps:
      - name: Wait for services
        run: sleep 30

      - name: Health check API
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.API_URL }}/health")
          if [ "$status" != "200" ]; then
            echo "API health check failed with status $status"
            exit 1
          fi
          echo "API health check passed"
