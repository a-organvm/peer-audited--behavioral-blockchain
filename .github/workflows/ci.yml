name: Styx CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Execute Tests (Turborepo)
      run: npx turbo run test

    - name: Execute Build (Turborepo)
      run: npx turbo run build

    - name: Lint (Turborepo)
      run: npx turbo run lint

    - name: Gate 04 — Redacted Build Check
      run: bash scripts/validation/04-redacted-build-check.sh

    - name: Gate 05 — Behavioral Physics Check
      run: npx tsx scripts/validation/05-behavioral-physics-check.ts
