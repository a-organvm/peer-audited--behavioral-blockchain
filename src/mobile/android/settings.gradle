pluginManagement {
  def rn_gradle_plugin_path = new File(rootDir.parentFile, "node_modules/@react-native/gradle-plugin").absolutePath
  includeBuild(rn_gradle_plugin_path)

  def expo_modules_autolinking_path = new File(rootDir.parentFile, "node_modules/expo-modules-autolinking/android/expo-gradle-plugin").absolutePath
  includeBuild(expo_modules_autolinking_path)
}

plugins {
  id("com.facebook.react.settings")
  id("expo-autolinking-settings")
}

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
  if (System.getenv('EXPO_USE_COMMUNITY_AUTOLINKING') == '1') {
    ex.autolinkLibrariesFromCommand()
  } else {
    ex.autolinkLibrariesFromCommand(expoAutolinking.rnConfigCommand)
  }
}
expoAutolinking.useExpoModules()

rootProject.name = 'Styx'

expoAutolinking.useExpoVersionCatalog()

include ':app'
// includeBuild(expoAutolinking.reactNativeGradlePlugin) // This is likely redundant
